<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600" role="img" aria-label="Ilustração inspirada na capa de Nevermind: um bebê nadando em direção a uma nota de dólar presa a um anzol, em águas turquesa">
  <defs>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5fd6db"/>
      <stop offset="0.45" stop-color="#1f9aa8"/>
      <stop offset="1" stop-color="#063b46"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0" r="0.9">
      <stop offset="0" stop-color="#bff3f3" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#bff3f3" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe0c2"/>
      <stop offset="1" stop-color="#e8b48c"/>
    </linearGradient>
  </defs>

  <!-- Água -->
  <rect width="600" height="600" fill="url(#water)"/>
  <rect width="600" height="320" fill="url(#sun)"/>

  <!-- Raios de luz -->
  <g fill="#eaffff" opacity="0.10">
    <polygon points="250,0 290,0 230,600 150,600"/>
    <polygon points="330,0 360,0 410,600 350,600"/>
    <polygon points="120,0 150,0 70,600 20,600"/>
  </g>

  <!-- Bolhas -->
  <g fill="#ffffff" opacity="0.5">
    <circle cx="120" cy="430" r="6"/>
    <circle cx="150" cy="380" r="4"/>
    <circle cx="100" cy="350" r="3"/>
    <circle cx="470" cy="470" r="7"/>
    <circle cx="500" cy="420" r="4"/>
    <circle cx="200" cy="500" r="5"/>
    <circle cx="430" cy="540" r="4"/>
    <circle cx="320" cy="120" r="3"/>
  </g>

  <!-- Linha + anzol + nota de dólar (canto superior direito) -->
  <path d="M455 0 C 460 70, 440 110, 452 150" stroke="#dfeff0" stroke-width="2" fill="none" opacity="0.85"/>
  <path d="M452 150 q -10 16 6 22" stroke="#dfeff0" stroke-width="3" fill="none"/>
  <g transform="translate(420 168) rotate(-12)">
    <rect x="0" y="0" width="120" height="56" rx="4" fill="#7cc06a" stroke="#3f7a33" stroke-width="2"/>
    <circle cx="60" cy="28" r="18" fill="none" stroke="#3f7a33" stroke-width="2"/>
    <text x="60" y="35" fill="#2f5e28" font-family="Georgia, serif" font-size="22" font-weight="bold" text-anchor="middle">$1</text>
    <text x="12" y="16" fill="#2f5e28" font-family="Georgia, serif" font-size="11">1</text>
    <text x="108" y="50" fill="#2f5e28" font-family="Georgia, serif" font-size="11" text-anchor="end">1</text>
  </g>

  <!-- Bebê nadando em direção à nota -->
  <g transform="translate(70 300) rotate(-14)">
    <!-- perna de trás -->
    <path d="M30 70 q -50 20 -78 -2 q 18 -34 60 -24 Z" fill="url(#skin)"/>
    <!-- corpo -->
    <ellipse cx="120" cy="60" rx="105" ry="62" fill="url(#skin)"/>
    <!-- perna da frente / bumbum -->
    <path d="M40 95 q -36 36 -8 70 q 40 -8 44 -56 Z" fill="#e8b48c"/>
    <!-- braço esticado em direção à nota -->
    <path d="M180 35 q 70 -28 120 -78 q 14 18 -2 34 q -52 44 -104 70 Z" fill="url(#skin)"/>
    <!-- mãozinha -->
    <circle cx="300" cy="-44" r="16" fill="#ffe0c2"/>
    <!-- cabeça -->
    <circle cx="190" cy="38" r="50" fill="url(#skin)"/>
    <!-- bochecha/sombra -->
    <ellipse cx="205" cy="55" rx="20" ry="14" fill="#f4c39c" opacity="0.7"/>
  </g>

  <text x="300" y="585" fill="#cfeff0" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" opacity="0.65">ilustração inspirada na capa — substitua por imagem licenciada</text>
</svg>
